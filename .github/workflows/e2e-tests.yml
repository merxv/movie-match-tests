name: E2E Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_BACKEND_PORT: "4000"
      APP_FRONTEND_PORT: "5173"
      JWT_SECRET: ci-jwt-secret
      MONGO_URI: mongodb://127.0.0.1:27017/moviematch_ci
      MOVIE_MATCH_BASE_URL: http://127.0.0.1:5173
      NEO4J_PASSWORD: password
      NEO4J_URI: bolt://127.0.0.1:7687
      NEO4J_USER: neo4j
      VITE_API_URL: http://127.0.0.1:4000
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      neo4j:
        image: neo4j:5
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd "cypher-shell -a bolt://127.0.0.1:7687 -u neo4j -p password 'RETURN 1;' || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20

    steps:
      - name: Checkout E2E tests repo
        uses: actions/checkout@v4

      - name: Validate app repository input
        run: |
          if [ -z "${{ vars.MOVIE_MATCH_APP_REPOSITORY }}" ]; then
            echo "Repository variable MOVIE_MATCH_APP_REPOSITORY is required."
            echo "Set it to the GitHub repo of the moviematch app, for example owner/moviematch."
            exit 1
          fi

      - name: Checkout moviematch app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.MOVIE_MATCH_APP_REPOSITORY }}
          ref: ${{ vars.MOVIE_MATCH_APP_REF != '' && vars.MOVIE_MATCH_APP_REF || 'main' }}
          path: app
          token: ${{ secrets.MOVIE_MATCH_APP_TOKEN != '' && secrets.MOVIE_MATCH_APP_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/backend/package-lock.json
            app/frontend/package-lock.json

      - name: Install test dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: app/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Create CI env files
        run: npm run ci:write-env -- "$GITHUB_WORKSPACE/app"

      - name: Start backend
        run: |
          mkdir -p ci-logs
          cd app/backend
          npm run start > "$GITHUB_WORKSPACE/ci-logs/backend.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/ci-logs/backend.pid"

      - name: Start frontend
        run: |
          cd app/frontend
          npm run dev -- --host 127.0.0.1 --port "${APP_FRONTEND_PORT}" > "$GITHUB_WORKSPACE/ci-logs/frontend.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/ci-logs/frontend.pid"

      - name: Wait for backend
        run: npm run ci:wait-http -- "http://127.0.0.1:${APP_BACKEND_PORT}/api/movies" 120000 backend

      - name: Wait for frontend
        run: npm run ci:wait-http -- "http://127.0.0.1:${APP_FRONTEND_PORT}/login" 120000 frontend

      - name: Seed MongoDB and Neo4j
        run: npm run ci:seed

      - name: Run WebdriverIO tests
        run: npx wdio run wdio.conf.js

      - name: Generate Allure HTML report
        if: always()
        run: npm run allure:generate

      - name: Stop app processes
        if: always()
        run: |
          if [ -f ci-logs/backend.pid ]; then kill "$(cat ci-logs/backend.pid)" || true; fi
          if [ -f ci-logs/frontend.pid ]; then kill "$(cat ci-logs/frontend.pid)" || true; fi

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Upload app logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: ci-logs
          if-no-files-found: warn
